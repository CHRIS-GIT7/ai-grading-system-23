name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          # This tells GitHub to look inside the backend folder
          cache-dependency-path: 'backend/package-lock.json'
      - name: Install backend dependencies
        run: npm install
      - name: Run backend lint
        run: npm run lint
      - name: Build backend
        run: npm run build

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          # This tells GitHub to look inside the frontend folder
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install frontend dependencies
        run: npm install
      - name: Run frontend lint
        run: npm run lint
      - name: Build frontend
        run: npm run build