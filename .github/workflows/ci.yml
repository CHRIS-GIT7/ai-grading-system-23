name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install backend dependencies
        run: npm install
        working-directory: ./backend
      - name: Build backend
        run: npm run build
        working-directory: ./backend

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      
      - name: Clean install dependencies
        working-directory: ./frontend
        # This force-cleans the environment before installing
        run: |
          rm -rf node_modules
          rm -f package-lock.json
          npm install
          
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build