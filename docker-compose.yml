services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ai_grading
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/ai_grading"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      PORT: ${PORT:-4000}
      CORS_ORIGINS: "http://localhost:3001,http://127.0.0.1:3001"
      NODE_ENV: development
    ports:
      - "4001:4000"
    command: ["npm", "run", "dev"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: "http://127.0.0.1:4001/api"
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE: "http://127.0.0.1:4001/api"
    ports:
      - "3001:5173"
    command: ["npm", "run", "dev", "--", "--host"]

volumes:
  db_data:
